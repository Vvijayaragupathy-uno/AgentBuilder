[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
PYTHONPATH = "."
AICCORE_BACKEND_ONLY = "true"

[phases.install]
dependsOn = ["setup"]
cmds = [
    "ls -R langflow/src/lfx | head -n 5",
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn aiccore.wrapper.main:app --host 0.0.0.0 --port ${PORT:-7860} --workers 4"
