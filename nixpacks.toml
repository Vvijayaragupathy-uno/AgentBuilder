[variables]
PYTHONPATH = ".:./langflow/src/backend/base"
AICCORE_BACKEND_ONLY = "false"

[phases.install]
dependsOn = ["setup"]
cmds = [
    "python -m pip install --upgrade pip",
    "pip install -r requirements.txt",
    "pip install ./langflow/src/lfx",
    "pip install ./langflow/src/backend/base",
    "pip install ./langflow"
]

[start]
cmd = "python -m uvicorn aiccore.wrapper.main:app --host 0.0.0.0 --port ${PORT:-7860} --workers 4"
