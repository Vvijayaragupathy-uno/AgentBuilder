[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
PYTHONPATH = "."
AICCORE_BACKEND_ONLY = "true"

[phases.install]
dependsOn = ["setup"]
cmds = [
    "echo '--- Diagnostics ---'",
    "pwd",
    "ls -F",
    "ls -F langflow/src/",
    "echo '--- Installing Dependencies ---'",
    "pip install --upgrade pip",
    "pip install ./langflow/src/lfx",
    "pip install ./langflow/src/backend/base",
    "pip install ./langflow",
    "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn aiccore.wrapper.main:app --host 0.0.0.0 --port ${PORT:-7860} --workers 4"
